services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: esports-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./esports-admin
      dockerfile: Dockerfile
    container_name: esports-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
